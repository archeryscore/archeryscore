<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="tiro_con_arco.ico">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Admin - ArcheryScore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-page">
    <header class="admin-header">
        <a href="home.html">← Home</a>
        <h1>Admin ArcheryScore</h1>
        <div class="admin-header-actions">
            <button id="changeAdminPasswordBtn">🔐 Cambia password</button>
            <button id="refreshAdmin">Aggiorna</button>
        </div>
    </header>

    <section class="admin-stats" id="adminStats"></section>

    <section class="admin-card">
        <h2>Utenti registrati</h2>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Utente</th>
                        <th>Email</th>
                        <th>Ruolo</th>
                        <th>Verifica</th>
                        <th>Stato</th>
                        <th>Gare</th>
                        <th>Allenamenti</th>
                        <th>Ultimo accesso</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="adminUsers"></tbody>
            </table>
        </div>
    </section>

    <section class="admin-card hidden-auth-box" id="adminUserDetail"></section>
</div>

<script src="js/auth-guard.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
